<h2>确认方向</h2>
<p class="subtitle">电影感叠加在现有审美之上，还是换一种气质？</p>

<div class="options">
  <div class="option" data-choice="keep-classical" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>保留古典底色，叠加电影感</h3>
      <p>
        金粉、墨韵、稻纸、暖光——这些元素保留，但用电影方式"呈现"它们：慢镜浮现、画幅收窄、胶片质地。像张艺谋《影》的视觉节奏叠加在网页上。
      </p>
    </div>
  </div>

  <div class="option" data-choice="pure-cinematic" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>以电影氛围为主体，简化古典元素</h3>
      <p>
        暗场、追光、画幅比、颗粒感主导，古典元素作为点缀。像一部当代独立电影的官网。
      </p>
    </div>
  </div>
</div>
